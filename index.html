<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ذات - للإستشارات النفسية</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/Silver.png"
    />
    <link rel="shortcut icon" sizes="10x10" href="./images/Silver.png" />
    <link rel="apple-touch-icon" href="./images/Silver.png" />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <header class="navbar">
      <div class="menu-btn" id="menuBtn">
        <i class="fa fa-bars"></i>
      </div>
      <div class="nav-title">الرئيسية</div>
      <div class="nav-right">
        <a href="./client-notifications-page/notifications.html" class="bell">
          <i class="fa-regular fa-bell"></i>
          <span class="dot" id="notificationDot"></span>
        </a>
      </div>
    </header>

    <aside class="sidebar">
      <div class="logo">
        <img src="./images/Frame 393.svg" alt="logo" />
      </div>

      <div class="user-card">
          <div class="user-info">
            <div class="user-greeting">مرحباً،</div>
            <div class="user-name">محمدأحمد</div>
            <div class="user-role">مريض</div>
          </div>
        </div>

      <ul>
        <li class="active">
          <a href="./index.html">
            <img src="./images/Icon.svg" alt="" />
            الرئيسية
          </a>
        </li>

        <li>
          <a href="./client-appointments-page/appointments.html">
            <img src="./images/Icon1.svg" alt="" />
            المواعيد
          </a>
        </li>

        <li>
          <a href="./client-chat-page/chat.html">
            <img src="./images/Icon2.svg" alt="" />
            الرسائل
          </a>
        </li>

        <li>
          <a href="./client-tests-page/tests.html">
            <img src="./images/Icon3.svg" alt="" />
            الإختبارات
          </a>
        </li>

        <li>
          <a href="./client-games-page/index.html">
            <img src="./images/Icon4.svg" alt="" />
            الأنشطة
          </a>
        </li>

        <li>
          <a href="./client-notifications-page/notifications.html">
            <img src="./images/Icon6.svg" alt="" />
            الإشعارات
          </a>
        </li>

        <li>
          <a href="./client-profile-page/profile.html">
            <img src="./images/Icon7.svg" alt="" />
            الملف الشخصي
          </a>
        </li>
      </ul>

      <button class="logout" id="logoutBtn">
         <img src="./images/Link.png" />
      </button>
    </aside>

    <main class="main">
      <section class="hero">
        <h1>مرحباً بك في ذات</h1>
        <p>إبحث عن الأخصائي المناسب لك واحجز موعدك الآن</p>
      </section>

      <div class="search">
        <input
          type="text"
          placeholder="إبحث عن أخصائي أو تخصص..."
          id="searchInput"
        />
        <i class="fa fa-search"></i>
      </div>

      <div class="count">
        <span id="doctorCount">0</span>
        أخصائي متاح
      </div>
      <div class="doctors" id="doctorsContainer"></div>
    </main>

    <footer>© 2026 ذات للإستشارات النفسية جميع الحقوق محفوظة</footer>

    <script src="./dashboard.js"></script>
  </body>
</html>
