<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الإشعارات</title>
    <link rel="stylesheet" href="../client-dashboard-page/style.css" />
    <link rel="stylesheet" href="./notifications.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="../images/Silver.png" />
    <link rel="shortcut icon" href="../images/Silver.png" />
    <link rel="apple-touch-icon" href="../images/Silver.png" />
  </head>

  <body>
    <header class="navbar">
      <div class="menu-btn" id="menuBtn">
        <i class="fa fa-bars"></i>
      </div>
      <div class="nav-title">الإشعارات</div>
      <div class="nav-right">
        <a href="../client-notifications-page/notifications.html" class="bell">
          <i class="fa-regular fa-bell"></i>
          <span class="dot" id="notificationDot"></span>
        </a>
      </div>
    </header>

    <aside class="sidebar">
      <div class="logo">
        <img src="../images/Frame 393.svg" alt="logo" />
      </div>

      <div class="user-card">
        <div class="user-info">
          <div class="user-greeting">مرحباً،</div>
          <div class="user-name">محمدأحمد</div>
          <div class="user-role">مريض</div>
        </div>
      </div>

      <ul>
        <li>
          <a href="../client-dashboard-page/index.html">
            <img src="../images/Icon.svg" alt="" />
            الرئيسية
          </a>
        </li>

        <li>
          <a href="../client-appointments-page/appointments.html">
            <img src="../images/Icon1.svg" alt="" />
            المواعيد
          </a>
        </li>

        <li>
          <a href="../client-chat-page/chat.html">
            <img src="../images/Icon2.svg" alt="" />
            الرسائل
          </a>
        </li>

        <li>
          <a href="../client-tests-page/tests.html">
            <img src="../images/Icon3.svg" alt="" />
            الإختبارات
          </a>
        </li>

        <li>
          <a href="../client-games-page/index.html">
            <img src="../images/Icon4.svg" alt="" />
            الأنشطة
          </a>
        </li>

        <li class="active">
          <a href="./notifications.html">
            <img src="../images/Icon6.svg" alt="" />
            الإشعارات
          </a>
        </li>

        <li>
          <a href="../client-profile-page/profile.html">
            <img src="../images/Icon7.svg" alt="" />
            الملف الشخصي
          </a>
        </li>
      </ul>

      <button class="logout" id="logoutBtn">
        <img src="../images/Link.png" />
      </button>
    </aside>

    <div class="main">
      <div class="notif-hero">
        <div>
          <h2>الإشعارات</h2>
          <p>تابع جميع التحديثات والإشعارات المهمة</p>
        </div>
      </div>

      <section class="stats-row">
        <div class="stat-card">
          <div class="stat-info">
            <div class="stat-label">إجمالي الإشعارات</div>
            <div class="stat-value" id="totalCases">6</div>
          </div>
          <div class="stat-icon">
            <img src="../images/Container7.png" alt="إجمالي الحالات" />
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-info">
            <div class="stat-label">هذا الأسبوع</div>
            <div class="stat-value" id="activeCases">3</div>
          </div>
          <div class="stat-icon">
            <img src="../images/Container 8.png" alt=" لحالات النشطة" />
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-info">
            <div class="stat-label">غير مقروءة</div>
            <div class="stat-value" id="todayAppointments">9</div>
          </div>
          <div class="stat-icon">
            <img src="../images/Container 9.png" alt="مواعيد اليوم" />
          </div>
        </div>
      </section>

      <div class="notif-actions">
        <button id="markAllRead">
          <i class="fa fa-check"></i> تحديد الكل كمقروء
        </button>
        <button id="deleteAll" class="danger">
          <i class="fa fa-trash"></i> حذف الكل
        </button>
      </div>

      <div id="notificationsList" class="notifications-list"></div>
    </div>
    <footer>© 2026 ذات للإستشارات النفسية جميع الحقوق محفوظة</footer>

    <script src="./notifications.js"></script>
  </body>
</html>
