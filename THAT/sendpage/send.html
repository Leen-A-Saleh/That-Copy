<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>استبيان لاختيار معالج نفسي مناسب</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link
    href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" type="./img/Silver.png" href="img/Silver.png">
 
  <link rel="stylesheet" href="../root.css">
 <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="../total.css" />
   <script src="../total.js"></script>
</head>


<body>

  <header class="main-header">
    <div class="header-right">
        <div class="brand">
                 <a href="../homepage/index.html">
  <img src="img/Frame 392 (1).png" alt="شعار ذات" class="brand-icon">
</a>
         
        </div>
    </div>

    <div class="header-left">
        <a href="..//loginpage/login.html" class="nav-link">تسجيل الدخول</a>
       <a href="..//signuppage/signup.html" class="btn btn-primary" id="signupLink">
        إنشاء حساب
    </a>
    </div>
</header>

  
  <main class="page-main">
    <section class="card">
      <p class="step-label">
        خطوة <span id="currentStep">1</span> من
        <span id="totalSteps">4</span>
      </p>

      <div class="wizard-progress">
        <div class="wizard-progress-bar" id="progressBar"></div>
      </div>

      <form id="surveyForm">

        <div class="form-step active">
          <h2 class="step-title">ما نوع العلاج الذي تبحث عنه؟</h2>
          <div class="field-group">
            <label class="option-line">
              <input type="radio" name="treatment_type" value="علاج فردي" required />
              <span>علاج فردي</span>
            </label>
            <label class="option-line">
              <input type="radio" name="treatment_type" value="علاج زوجي" />
              <span>علاج زوجي</span>
            </label>
            <label class="option-line">
              <input type="radio" name="treatment_type" value="علاج سلوكي للأطفال والمراهقين" />
              <span>علاج سلوكي للأطفال والمراهقين</span>
            </label>
          </div>
        </div>

        <div class="form-step ">
          <h2 class="step-title">المعلومات الشخصية</h2>

          <div class="field-group">
            <label class="field-label" for="fullName">الاسم الكامل</label>
            <input
              id="fullName"
              name="fullName"
              type="text"
              class="text-input"
              placeholder="أدخل اسمك الكامل"
              required
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="email">البريد الإلكتروني</label>
            <input
              id="email"
              name="email"
              type="email"
              class="text-input"
              placeholder="example@email.com"
              required
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="phone">رقم الهاتف</label>
            <input
              id="phone"
              name="phone"
              type="tel"
              class="text-input"
              placeholder="05xxxxxxxx"
              required
            />
          </div>
        </div>

        <div class="form-step">
          <h2 class="step-title">ما هو نوع الجلسة المفضل؟</h2>

          <div class="field-group">
            <label class="option-line">
              <input type="radio" name="session_type" value="جلسات عن بعد" required />
              <span>جلسات عن بعد</span>
            </label>
            <label class="option-line">
              <input type="radio" name="session_type" value="جلسات حضورية" />
              <span>جلسات حضورية</span>
            </label>
            <label class="option-line">
              <input type="radio" name="session_type" value="كلاهما" />
              <span>كلاهما</span>
            </label>
          </div>

          <h2 class="step-title">ما هو الوقت المفضل للجلسات؟</h2>
          <div class="field-group time-grid">
            <label class="option-line">
              <input type="radio" name="session_time" value="صباحاً" required />
              <span>صباحاً</span>
            </label>
            <label class="option-line">
              <input type="radio" name="session_time" value="ظهراً" />
              <span>ظهراً</span>
            </label>
            <label class="option-line">
              <input type="radio" name="session_time" value="مساءً" />
              <span>مساءً</span>
            </label>
            <label class="option-line">
              <input type="radio" name="session_time" value="مرن" />
              <span>مرن</span>
            </label>
          </div>
        </div>

        <div class="form-step">
          <h2 class="step-title">إنشاء حساب</h2>

          <div class="field-group">
            <label class="field-label" for="username">اسم المستخدم</label>
            <input
              id="username"
              name="username"
              type="text"
              class="text-input"
              placeholder="اختر اسم مستخدم"
              required
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="password">كلمة المرور</label>
            <input
              id="password"
              name="password"
              type="password"
              class="text-input"
              placeholder="أدخل كلمة المرور"
              required
            />
            <p class="field-hint">يجب أن تحتوي على 8 أحرف على الأقل</p>
          </div>

          <div class="field-group">
            <label class="field-label" for="confirmPassword">تأكيد كلمة المرور</label>
            <input
              id="confirmPassword"
              name="confirmPassword"
              type="password"
              class="text-input"
              placeholder="أعد إدخال كلمة المرور"
              required
            />
          </div>
        </div>
      </form>
      <div class="wizard-buttons">
        <button type="button" id="prevBtn" class="btn secondary" disabled>السابق</button>
        <button type="button" id="nextBtn" class="btn primary">التالي</button>
      </div>

        <p class="login-hint">
    لديك حساب بالفعل؟ <a href="../loginpage/login.html" class="link">تسجيل الدخول</a>
</p>
    </section>
  </main>

  
  <footer class="main-footer">
    © 2026 ذات للاستشارات النفسية جميع الحقوق محفوظة.
  </footer>

  <script src="main.js"></script>
</body>
</html>
